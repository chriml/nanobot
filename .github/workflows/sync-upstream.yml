name: Sync Upstream

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

env:
  BASE_BRANCH: main
  SYNC_BRANCH: sync/upstream-main
  UPSTREAM_URL: https://github.com/HKUDS/nanobot.git
  UPSTREAM_BRANCH: main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update sync branch from upstream
        run: |
          set -euo pipefail

          git remote add upstream "$UPSTREAM_URL" || git remote set-url upstream "$UPSTREAM_URL"
          git fetch origin "$BASE_BRANCH"
          git fetch upstream "$UPSTREAM_BRANCH"

          git checkout -B "$SYNC_BRANCH" "upstream/$UPSTREAM_BRANCH"
          git push --force-with-lease origin "$SYNC_BRANCH"

      - name: Create or update sync pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          pr_number="$(
            gh pr list \
              --head "$SYNC_BRANCH" \
              --base "$BASE_BRANCH" \
              --state open \
              --json number \
              --jq '.[0].number // ""'
          )"

          if git diff --quiet "origin/$BASE_BRANCH...$SYNC_BRANCH" --; then
            if [ -n "$pr_number" ]; then
              gh pr close "$pr_number" \
                --comment "Closing because \`$SYNC_BRANCH\` no longer differs from \`$BASE_BRANCH\`."
            fi
            exit 0
          fi

          pr_title="Sync upstream nanobot"
          pr_body=$'This PR tracks `'"$UPSTREAM_URL"'` (`'"$UPSTREAM_BRANCH"'`) into `'"$BASE_BRANCH"'`.\n\n- The workflow force-updates `'"$SYNC_BRANCH"'` to the latest upstream tip.\n- If this PR is mergeable, auto-merge is enabled.\n- If it has conflicts, resolve them here and merge manually.'

          if [ -z "$pr_number" ]; then
            gh pr create \
              --base "$BASE_BRANCH" \
              --head "$SYNC_BRANCH" \
              --title "$pr_title" \
              --body "$pr_body"

            pr_number="$(
              gh pr list \
                --head "$SYNC_BRANCH" \
                --base "$BASE_BRANCH" \
                --state open \
                --json number \
                --jq '.[0].number'
            )"
          else
            gh pr edit "$pr_number" --title "$pr_title" --body "$pr_body"
          fi

          gh pr merge "$pr_number" --auto --merge || true
